<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Socket 客服组件演示</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; color: #e2e8f0; background: radial-gradient(circle at 20% 20%, #164e63, #071526 46%, #020617); font-family: Arial, "Microsoft YaHei", sans-serif; }
    main { width: min(680px, calc(100vw - 48px)); padding: 40px; border: 1px solid rgba(125,211,252,.22); border-radius: 24px; background: rgba(15,23,42,.72); box-shadow: 0 30px 80px rgba(0,0,0,.35); }
    h1 { margin-top: 0; color: #7dd3fc; }
    code { color: #67e8f9; }
  </style>
</head>
<body>
  <main>
    <p>独立网站接入演示</p>
    <h1>右下角是可复用 Socket 客服组件</h1>
    <p>点击客服按钮后才会创建会话，并把会话 ID 实时登记到管理端。后端地址来自 <code>socket-config.js</code>，不会出现在页面 URL 中。</p>
  </main>
  <script src="/socket/socket-config.js"></script>
  <script src="/socket/socket-customer-widget.js" data-title="演示站在线客服" data-color="#06b6d4" data-session-key="demo-site"></script>
</body>
</html>
